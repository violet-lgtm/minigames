<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="mobile-web-app-capable" content="yes">
    <title>Reaction Slots</title>
    <link rel="stylesheet" href="css/common.css">
    <script src="js/i18n.js"></script>
    <style>
        .container {
            max-width: 720px;
            text-align: center;
        }

        .topbar {
            display: flex;
            justify-content: space-around;
            gap: 12px;
            margin-bottom: 18px;
        }

        .topbar .stat-value { font-size: 1.5em; }
        .topbar .stat-label { font-size: 0.8em; }

        /* The slot machine cabinet — a white card like the page's audio player */
        .machine {
            background: var(--surface);
            border: 1px solid var(--surface-border);
            border-radius: 18px;
            padding: 20px;
            box-shadow: 0 4px 16px rgba(0, 0, 0, 0.10);
            position: relative;
        }

        .reels {
            display: flex;
            justify-content: center;
            gap: 14px;
            background: #ececec;
            border-radius: 14px;
            padding: 16px 16px;
            box-shadow: inset 0 2px 8px rgba(0, 0, 0, 0.12);
        }

        .reel {
            position: relative;
            width: 110px;
            height: 270px; /* 3 cells of 90px */
            overflow: hidden;
            background: linear-gradient(180deg, #ffffff 0%, #f4f4f6 100%);
            border-radius: 10px;
            box-shadow: inset 0 0 14px rgba(0, 0, 0, 0.10);
            transition: outline-color 0.15s, box-shadow 0.15s;
            outline: 3px solid transparent;
            outline-offset: 3px;
        }

        .reel.active {
            outline-color: var(--accent);
            box-shadow: inset 0 0 14px rgba(0, 0, 0, 0.10), 0 0 18px rgba(246, 182, 46, 0.65);
        }

        .reel.locked {
            outline-color: var(--good-color);
        }

        /* Top & bottom fade so it reads like a window */
        .reel::before,
        .reel::after {
            content: "";
            position: absolute;
            left: 0;
            right: 0;
            height: 70px;
            z-index: 3;
            pointer-events: none;
        }

        .reel::before {
            top: 0;
            background: linear-gradient(180deg, rgba(255, 255, 255, 0.96), transparent);
        }

        .reel::after {
            bottom: 0;
            background: linear-gradient(0deg, rgba(255, 255, 255, 0.96), transparent);
        }

        .strip {
            position: absolute;
            left: 0;
            right: 0;
            top: 0;
            will-change: transform;
        }

        .cell {
            height: 90px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 3em;
            line-height: 1;
        }

        .cell.target span {
            filter: drop-shadow(0 0 5px rgba(226, 163, 28, 0.85));
        }

        /* Center payline window */
        .payline {
            position: absolute;
            left: -6px;
            right: -6px;
            top: 90px;
            height: 90px;
            z-index: 4;
            pointer-events: none;
            border-top: 3px solid var(--accent-strong);
            border-bottom: 3px solid var(--accent-strong);
            box-shadow: 0 0 12px rgba(226, 163, 28, 0.35);
        }

        .payline .arrow {
            position: absolute;
            top: 50%;
            transform: translateY(-50%);
            color: var(--accent-strong);
            font-size: 1.4em;
            text-shadow: 0 1px 2px rgba(0, 0, 0, 0.25);
        }

        .payline .arrow.left { left: -2px; }
        .payline .arrow.right { right: -2px; }

        /* Per-reel result tag */
        .reel-result {
            position: absolute;
            left: 50%;
            top: 50%;
            transform: translate(-50%, -50%) scale(0.6);
            z-index: 6;
            font-weight: bold;
            font-size: 1.15em;
            padding: 6px 12px;
            border-radius: 8px;
            color: #1a1a1a;
            opacity: 0;
            transition: opacity 0.2s, transform 0.2s;
            white-space: nowrap;
        }

        .reel-result.show {
            opacity: 1;
            transform: translate(-50%, -50%) scale(1);
        }

        .machine-foot {
            margin-top: 16px;
            display: flex;
            justify-content: center;
        }

        .stop-btn {
            font-size: 1.5em;
            font-weight: 800;
            padding: 18px 60px;
            border-radius: 14px;
            letter-spacing: 1px;
            min-width: 220px;
        }

        .target-banner {
            margin: 14px 0 4px;
            color: var(--text-secondary);
            font-size: 1.05em;
        }

        .target-banner .sym {
            font-size: 1.3em;
            vertical-align: middle;
            filter: drop-shadow(0 0 5px rgba(245, 166, 35, 0.9));
        }

        .hint {
            margin-top: 10px;
            color: var(--text-secondary);
            font-size: 0.85em;
            opacity: 0.8;
        }

        /* Results modal breakdown */
        .breakdown {
            list-style: none;
            margin: 16px 0;
            text-align: left;
        }

        .breakdown li {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 8px 4px;
            border-bottom: 1px solid var(--panel-border);
            font-size: 1.05em;
        }

        .breakdown .tag {
            font-weight: bold;
            padding: 3px 10px;
            border-radius: 6px;
            color: #1a1a1a;
        }

        .tag-perfect { background: var(--good-color); }
        .tag-great { background: #86efac; }
        .tag-good { background: var(--ok-color); }
        .tag-near { background: #fb923c; }
        .tag-miss { background: var(--miss-color); }

        .final-score {
            font-size: 2.6em;
            font-weight: bold;
            color: var(--primary-color);
        }

        @media (max-width: 768px) {
            .reel { width: 92px; height: 234px; }
            .cell { height: 78px; font-size: 2.5em; }
            .reel::before, .reel::after { height: 60px; }
            .payline { top: 78px; height: 78px; }
            .stop-btn { padding: 18px 40px; font-size: 1.4em; width: 100%; }
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>🎰 Reaction Slots</h1>
        </header>

        <div class="topbar info-panel">
            <div class="stat">
                <div class="stat-label" data-i18n="stat_reel">Reel</div>
                <div class="stat-value" id="reelProgress">0 / 3</div>
            </div>
            <div class="stat">
                <div class="stat-label" data-i18n="stat_score">Score</div>
                <div class="stat-value" id="scoreVal">0</div>
            </div>
            <div class="stat">
                <div class="stat-label" data-i18n="stat_combo">Combo</div>
                <div class="stat-value" id="multiVal">×1</div>
            </div>
            <div class="stat">
                <div class="stat-label" data-i18n="stat_best">Best</div>
                <div class="stat-value" id="bestVal">–</div>
            </div>
        </div>

        <div class="target-banner" id="targetBanner">
            Stop each reel on <span class="sym">7️⃣</span> as it crosses the line
        </div>

        <div class="machine">
            <div class="reels" id="reels"></div>
            <div class="machine-foot">
                <button class="btn btn-primary stop-btn" id="stopBtn">START</button>
            </div>
        </div>

        <div class="hint" id="hint">Tip: tap STOP, click, or press <strong>Space</strong> to lock the active reel.</div>
    </div>

    <!-- Results modal -->
    <div class="modal" id="resultModal">
        <div class="modal-content">
            <div class="win-message" id="resultTitle">Round Complete!</div>
            <div class="final-score"><span id="finalScore">0</span><span style="font-size:0.45em;color:var(--text-secondary)" data-i18n="pts"> pts</span></div>
            <ul class="breakdown" id="breakdown"></ul>
            <div id="newBest" data-i18n="newbest" style="color:var(--good-color);font-weight:bold;margin-bottom:10px;display:none">🏆 New best score!</div>
            <button class="btn btn-primary" id="playAgainBtn" data-i18n="modal_playagain">🔄 Play Again</button>
            <button class="btn btn-secondary" id="goBackBtn" data-i18n="modal_back">← Go back</button>
        </div>
    </div>

    <script>
    (() => {
        'use strict';

        // ---- Configuration ----
        const SYMBOLS = ['7️⃣', '🍒', '🔔', '⭐', '🍋', '💎', '🍉'];
        const TARGET_INDEX = 0;          // index of the symbol you must stop on
        const TARGET_SYMBOL = SYMBOLS[TARGET_INDEX];
        const NUM_REELS = 3;
        const CYCLES = 3;                // how many full symbol sequences are stacked in the strip
        const BEST_KEY = 'reactionSlots.best';

        // Reading the live cell height keeps scoring honest across breakpoints.
        let CELL = 90;

        // Each reel spins faster than the last (px per millisecond).
        // Eased off the top end: the final reel now runs at the old middle speed
        // (0.78) and the middle reel gets a new, gentler difficulty (0.66).
        const SPEEDS = [0.55, 0.66, 0.78];

        // When the GOAL symbol lands on the payline, how centred it is decides the tier.
        // Absolute alignment error (px) -> tier. Scaled by CELL at runtime.
        const HIT_RATINGS = [
            { key: 'perfect', cls: 'tag-perfect', frac: 0.09, points: 100, hit: true },
            { key: 'great',   cls: 'tag-great',   frac: 0.24, points: 60,  hit: true },
            { key: 'good',    cls: 'tag-good',    frac: 0.50, points: 30,  hit: true },
        ];
        // A neighbour of the goal landed on the line instead — still worth a little.
        const NEAR = { key: 'near', cls: 'tag-near', points: 15, hit: false };
        // Two or more symbols away from the goal.
        const MISS = { key: 'miss', cls: 'tag-miss', points: 0, hit: false };

        // Multiplier applied to the round score for landing the goal symbol on
        // multiple reels (a "combo" of lucky 7s).
        function comboMultiplier(hits) {
            if (hits >= 3) return 3;
            if (hits >= 2) return 2;
            return 1;
        }

        // ---- i18n ----
        const I = window.SlotI18n;
        const t = (key, vars) => I.t(key, vars);

        // ---- State ----
        const reels = [];          // { el, strip, resultEl, pos, speed, stopped, result }
        let activeReel = 0;
        let started = false;
        let rafId = null;
        let lastTs = 0;
        let baseScore = 0;
        let multiplier = 1;
        let best = loadBest();
        let btnState = 'start';    // which label the STOP button shows: start | stop | again
        let lastResult = null;     // cached round result so we can re-render on language change

        // ---- DOM ----
        const reelsContainer = document.getElementById('reels');
        const stopBtn = document.getElementById('stopBtn');
        const scoreVal = document.getElementById('scoreVal');
        const multiVal = document.getElementById('multiVal');
        const bestVal = document.getElementById('bestVal');
        const reelProgress = document.getElementById('reelProgress');
        const targetBanner = document.getElementById('targetBanner');
        const hintEl = document.getElementById('hint');
        const resultModal = document.getElementById('resultModal');
        const finalScoreEl = document.getElementById('finalScore');
        const breakdownEl = document.getElementById('breakdown');
        const newBestEl = document.getElementById('newBest');
        const resultTitle = document.getElementById('resultTitle');

        bestVal.textContent = best == null ? '–' : best;

        function setBtn() { stopBtn.textContent = t('btn_' + btnState); }

        function renderBanner() {
            targetBanner.innerHTML = t('banner', { sym: '<span class="sym">' + TARGET_SYMBOL + '</span>' });
        }

        function renderHint() {
            hintEl.innerHTML = t('hint', { key: '<strong>' + t('key_space') + '</strong>' });
        }

        function loadBest() {
            try {
                const v = parseInt(localStorage.getItem(BEST_KEY), 10);
                return Number.isFinite(v) ? v : null;
            } catch (e) { return null; }
        }

        function saveBest(v) {
            try { localStorage.setItem(BEST_KEY, String(v)); } catch (e) {}
        }

        // Build the reels and their repeating symbol strips.
        function buildReels() {
            reelsContainer.innerHTML = '';
            reels.length = 0;
            for (let r = 0; r < NUM_REELS; r++) {
                const reel = document.createElement('div');
                reel.className = 'reel';

                const strip = document.createElement('div');
                strip.className = 'strip';

                // Stack CYCLES copies of the full sequence so it scrolls seamlessly.
                for (let c = 0; c < CYCLES; c++) {
                    for (let i = 0; i < SYMBOLS.length; i++) {
                        const cell = document.createElement('div');
                        cell.className = 'cell' + (i === TARGET_INDEX ? ' target' : '');
                        const span = document.createElement('span');
                        span.textContent = SYMBOLS[i];
                        cell.appendChild(span);
                        strip.appendChild(cell);
                    }
                }
                reel.appendChild(strip);

                const payline = document.createElement('div');
                payline.className = 'payline';
                payline.innerHTML = '<span class="arrow left">▶</span><span class="arrow right">◀</span>';
                reel.appendChild(payline);

                const resultEl = document.createElement('div');
                resultEl.className = 'reel-result';
                reel.appendChild(resultEl);

                reelsContainer.appendChild(reel);

                reels.push({
                    el: reel,
                    strip,
                    resultEl,
                    // Start each reel at a different offset so they look independent.
                    pos: Math.random() * SYMBOLS.length * CELL,
                    speed: SPEEDS[r] || SPEEDS[SPEEDS.length - 1],
                    stopped: false,
                    result: null,
                });
            }
            CELL = reels[0].el.querySelector('.cell').getBoundingClientRect().height || 90;
            render();
        }

        // Render the current scroll position of every reel.
        function render() {
            const cycleH = SYMBOLS.length * CELL;
            for (const reel of reels) {
                const y = reel.pos % cycleH;
                reel.strip.style.transform = `translateY(${-y}px)`;
            }
        }

        // Smallest signed difference between two positions on a circular track.
        function wrap(delta, cycle) {
            let d = ((delta % cycle) + cycle) % cycle;
            if (d > cycle / 2) d -= cycle;
            return d;
        }

        // Distance (px) the target symbol sits from the center payline.
        function targetOffset(reel) {
            const cycleH = SYMBOLS.length * CELL;
            // Strip-space position currently at the viewport center (payline is 1 cell down).
            const center = reel.pos + 1.5 * CELL;
            const targetCenter = TARGET_INDEX * CELL + 0.5 * CELL;
            return wrap(center - targetCenter, cycleH);
        }

        // Which symbol is currently resting on the payline.
        function landedIndex(reel) {
            const center = reel.pos + 1.5 * CELL;
            const idx = Math.round((center - 0.5 * CELL) / CELL);
            const S = SYMBOLS.length;
            return ((idx % S) + S) % S;
        }

        // Circular distance (in symbols) between two reel positions.
        function symbolDistance(a, b) {
            const S = SYMBOLS.length;
            const d = Math.abs(a - b);
            return Math.min(d, S - d);
        }

        // Decide the rating for a stopped reel from the symbol on the line and how
        // centred the goal is.
        function rate(reel, offsetPx) {
            const dist = symbolDistance(landedIndex(reel), TARGET_INDEX);
            if (dist === 0) {
                const abs = Math.abs(offsetPx);
                for (const r of HIT_RATINGS) {
                    if (abs <= r.frac * CELL) return r;
                }
                return HIT_RATINGS[HIT_RATINGS.length - 1];
            }
            return dist === 1 ? NEAR : MISS;
        }

        function loop(ts) {
            if (lastTs === 0) lastTs = ts;
            let dt = ts - lastTs;
            lastTs = ts;
            if (dt > 60) dt = 60; // guard against tab-switch jumps

            for (const reel of reels) {
                if (!reel.stopped) reel.pos += reel.speed * dt;
            }
            render();
            rafId = requestAnimationFrame(loop);
        }

        function startGame() {
            started = true;
            baseScore = 0;
            multiplier = 1;
            activeReel = 0;
            updateScoreboard();
            resultModal.classList.remove('active');
            buildReels();
            reels[0].el.classList.add('active');
            updateProgress();
            btnState = 'stop';
            setBtn();
            lastTs = 0;
            rafId = requestAnimationFrame(loop);
        }

        function updateProgress() {
            const done = reels.filter(r => r.stopped).length;
            reelProgress.textContent = `${done} / ${NUM_REELS}`;
        }

        function updateScoreboard() {
            scoreVal.textContent = baseScore * multiplier;
            multiVal.textContent = '×' + multiplier;
            multiVal.style.color = multiplier > 1 ? 'var(--good-color)' : 'var(--primary-color)';
        }

        function stopActiveReel() {
            if (activeReel >= NUM_REELS) return;
            const reel = reels[activeReel];
            if (reel.stopped) return;

            // Snap the reel so the nearest whole symbol sits on the payline (looks tidy),
            // but score against where it *actually* stopped.
            const offset = targetOffset(reel);
            const ratingForScore = rate(reel, offset);
            const ms = Math.round(Math.abs(offset) / reel.speed);

            // Align to nearest symbol cell for a clean resting position, then nudge
            // pos by that small delta (always within half a cell, so pos stays positive).
            const center = reel.pos + 1.5 * CELL;
            const nearestIndex = Math.round((center - 0.5 * CELL) / CELL);
            const snappedCenter = nearestIndex * CELL + 0.5 * CELL;
            reel.pos += (snappedCenter - center);

            reel.stopped = true;
            reel.result = { rating: ratingForScore, offset, ms };

            // Recompute the running score: base points x the goal-combo multiplier.
            baseScore += ratingForScore.points;
            const hits = reels.filter(r => r.stopped && r.result.rating.hit).length;
            multiplier = comboMultiplier(hits);
            updateScoreboard();

            reel.el.classList.remove('active');
            reel.el.classList.add('locked');
            showReelResult(reel, ratingForScore, ms);
            render();
            updateProgress();

            activeReel++;
            if (activeReel < NUM_REELS) {
                reels[activeReel].el.classList.add('active');
            } else {
                finishRound();
            }
        }

        function showReelResult(reel, rating, ms) {
            const el = reel.resultEl;
            if (rating === MISS) {
                el.textContent = t('rating_miss');
            } else if (rating === NEAR) {
                el.textContent = `${t('rating_near')} +${rating.points}`;
            } else {
                el.textContent = `${t('rating_' + rating.key)} · ${ms}ms`;
            }
            el.className = 'reel-result show ' + rating.cls;
        }

        function finishRound() {
            btnState = 'again';
            setBtn();
            cancelAnimationFrame(rafId);
            rafId = null;
            started = false;

            const perReel = reels.map(r => ({
                key: r.result.rating.key,
                cls: r.result.rating.cls,
                points: r.result.rating.points,
                hit: r.result.rating.hit,
                isNear: r.result.rating === NEAR,
                ms: r.result.ms,
            }));
            const hits = perReel.filter(r => r.hit).length;
            multiplier = comboMultiplier(hits);
            const finalScore = baseScore * multiplier;

            let isBest = false;
            if (best == null || finalScore > best) {
                best = finalScore;
                saveBest(best);
                bestVal.textContent = best;
                isBest = finalScore > 0;
            }

            const flawless = hits === NUM_REELS && baseScore === HIT_RATINGS[0].points * NUM_REELS;
            lastResult = { perReel, hits, multiplier, finalScore, isBest, flawless };

            renderResults();
            setTimeout(() => resultModal.classList.add('active'), 650);
        }

        // Render the cached round result in the current language.
        function renderResults() {
            if (!lastResult) return;
            const { perReel, hits, multiplier: mult, finalScore, isBest, flawless } = lastResult;

            breakdownEl.innerHTML = '';
            perReel.forEach((r, i) => {
                const detail = r.hit ? t('detail_off', { ms: r.ms })
                    : r.isNear ? t('detail_near')
                    : t('detail_miss');
                const li = document.createElement('li');
                li.innerHTML =
                    `<span>${t('reel_label', { n: i + 1 })} <span style="opacity:.6">(${detail})</span></span>` +
                    `<span class="tag ${r.cls}">${t('rating_' + r.key)} +${r.points}</span>`;
                breakdownEl.appendChild(li);
            });

            // Multiplier line in the modal (only interesting when it kicks in).
            if (mult > 1) {
                const li = document.createElement('li');
                li.style.borderBottom = 'none';
                li.innerHTML =
                    `<span>${t('combo_line', { hits, sym: TARGET_SYMBOL })}</span>` +
                    `<span class="tag tag-perfect">×${mult}</span>`;
                breakdownEl.appendChild(li);
            }

            finalScoreEl.textContent = finalScore;
            newBestEl.style.display = isBest ? 'block' : 'none';

            resultTitle.textContent =
                flawless ? t('title_jackpot')
                : hits === NUM_REELS ? t('title_triple')
                : finalScore >= 180 ? t('title_sharp')
                : finalScore >= 60 ? t('title_complete')
                : t('title_practise');
        }

        // ---- Input ----
        function handleAction() {
            if (!started) { startGame(); return; }
            stopActiveReel();
        }

        stopBtn.addEventListener('click', handleAction);

        document.addEventListener('keydown', (e) => {
            if (e.code === 'Space' || e.key === ' ') {
                e.preventDefault();
                handleAction();
            }
        });

        document.getElementById('playAgainBtn').addEventListener('click', startGame);

        // Return to whatever page the player came from.
        document.getElementById('goBackBtn').addEventListener('click', () => {
            if (history.length > 1) history.back();
            else window.location.href = '../';
        });

        // Recompute CELL on resize so scoring matches what is on screen.
        window.addEventListener('resize', () => {
            if (reels.length) {
                const c = reels[0].el.querySelector('.cell');
                if (c) CELL = c.getBoundingClientRect().height || CELL;
            }
        });

        // Re-apply every translatable string when the language changes.
        function applyLang() {
            setBtn();
            renderBanner();
            renderHint();
            if (resultModal.classList.contains('active')) renderResults();
        }
        I.onChange(applyLang);
        applyLang();

        // Show idle reels behind the START button.
        buildReels();
    })();
    </script>
</body>
</html>
