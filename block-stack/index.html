<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="mobile-web-app-capable" content="yes">
    <title>Block Stacker - Build the Tower!</title>
    <link rel="stylesheet" href="css/common.css">
    <script src="../shared/i18n.js"></script>
    <script src="js/i18n.js"></script>
    <script src="js/blocks.js"></script>
    <style>
        .menu-container {
            max-width: 560px;
            text-align: center;
        }

        .menu-buttons {
            display: flex;
            flex-direction: column;
            gap: 18px;
            max-width: 400px;
            margin: 0 auto;
        }

        .menu-btn {
            width: 100%;
            padding: 20px;
            font-size: 1.3em;
        }

        /* slot-machine-style cabinet around the preview */
        .preview-cabinet {
            background: var(--surface);
            border: 1px solid var(--surface-border);
            border-radius: 18px;
            padding: 16px;
            box-shadow: 0 4px 16px rgba(0, 0, 0, 0.10);
            max-width: 320px;
            margin: 24px auto;
        }

        /* animated preview tower, recessed like a slot window */
        .preview-tower {
            display: flex;
            flex-direction: column-reverse;
            align-items: center;
            gap: 4px;
            min-height: 150px;
            padding: 14px 0;
            justify-content: flex-end;
            background: linear-gradient(180deg, #ffffff 0%, #f4f4f6 100%);
            border-radius: 12px;
            box-shadow: inset 0 0 14px rgba(0, 0, 0, 0.10);
        }

        .preview-block {
            height: 32px;
            border-radius: 6px;
            box-shadow: 0 2px 5px rgba(0, 0, 0, 0.18);
            animation: settle 0.5s ease-out backwards;
        }

        @keyframes settle {
            from { transform: translateY(-60px); opacity: 0; }
            to { opacity: 1; }
        }

        .feature-list {
            text-align: left;
            margin: 28px auto;
            max-width: 520px;
            list-style: none;
        }

        .feature-list li {
            color: var(--text-secondary);
            margin: 12px 0;
            font-size: 1.05em;
            padding-left: 28px;
            position: relative;
        }

        .feature-list li::before {
            content: "\25C8";
            position: absolute;
            left: 0;
            color: var(--accent-strong);
        }

        /* skin picker */
        .skin-section {
            margin: 26px auto 6px;
            max-width: 520px;
        }

        .skin-title {
            font-weight: 700;
            color: var(--text-secondary);
            font-size: 0.95em;
            margin-bottom: 12px;
        }

        .skin-row {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            justify-content: center;
        }

        .skin-chip {
            display: flex;
            align-items: center;
            gap: 8px;
            border: 2px solid var(--surface-border);
            background: var(--surface);
            border-radius: 22px;
            padding: 7px 14px 7px 8px;
            cursor: pointer;
            font-family: inherit;
            font-size: 0.92em;
            font-weight: 600;
            color: var(--text-primary);
            transition: border-color 0.15s, transform 0.15s;
        }

        .skin-chip:hover { transform: translateY(-1px); }

        .skin-chip.active {
            border-color: var(--accent);
            box-shadow: 0 4px 12px rgba(63, 108, 246, 0.25);
        }

        .skin-dot {
            width: 18px;
            height: 18px;
            border-radius: 5px;
            box-shadow: inset 0 0 0 1px rgba(0, 0, 0, 0.15);
        }
    </style>
</head>
<body>
    <div class="container menu-container">
        <header>
            <h1 data-i18n="heading">🧱 Block Stacker</h1>
            <p data-i18n="lead">A block slides back and forth at the top of the screen. Drop it to fall onto the tower — line it up and build as high as you can before you miss!</p>
        </header>

        <div class="preview-cabinet">
            <div class="preview-tower" id="previewTower"></div>
        </div>

        <div class="menu-buttons">
            <a href="game.html" class="btn btn-primary menu-btn" data-i18n="play">🎮 Play Game</a>
            <a href="editor.html" class="btn btn-secondary menu-btn" data-i18n="create">🔧 Create a Challenge</a>
        </div>

        <div class="skin-section">
            <div class="skin-title" data-i18n="skin_title">Block style</div>
            <div class="skin-row" id="skinRow"></div>
        </div>

        <ul class="feature-list" id="featureList"></ul>
    </div>

    <script>
        (function () {
            const I = window.BlockI18n;
            const SKIN_KEY = 'blockStack.skin';
            const skins = window.BlockSkins.list();

            /* ----- feature list (re-rendered on language change) ----- */
            const featureList = document.getElementById('featureList');
            function renderFeatures() {
                featureList.innerHTML = '';
                (I.tf('feat') || []).forEach((f) => {
                    const li = document.createElement('li');
                    li.textContent = f;
                    featureList.appendChild(li);
                });
            }
            I.onChange(renderFeatures);
            let current = localStorage.getItem(SKIN_KEY);
            if (!current || !window.BlockSkins.get(current) ||
                window.BlockSkins.get(current).id !== current) {
                current = skins[0].id;
            }

            /* ----- skin picker chips ----- */
            const row = document.getElementById('skinRow');
            function renderChips() {
                row.innerHTML = '';
                skins.forEach((skin) => {
                    const btn = document.createElement('button');
                    btn.className = 'skin-chip' + (skin.id === current ? ' active' : '');
                    btn.type = 'button';
                    const dot = document.createElement('span');
                    dot.className = 'skin-dot';
                    dot.style.background = skin.swatch ||
                        (skin.colorFor ? skin.colorFor(0) : '#888');
                    const label = document.createElement('span');
                    label.textContent = skin.name;
                    btn.appendChild(dot);
                    btn.appendChild(label);
                    btn.addEventListener('click', () => {
                        current = skin.id;
                        localStorage.setItem(SKIN_KEY, current);
                        renderChips();
                        renderPreview();
                    });
                    row.appendChild(btn);
                });
            }

            /* ----- animated preview tower using the chosen skin ----- */
            const tower = document.getElementById('previewTower');
            function renderPreview() {
                const skin = window.BlockSkins.get(current);
                tower.innerHTML = '';
                // Equal-size, squarish blocks stacked with small offsets — the
                // full block always stays, just like in the game.
                const offsets = [0, 14, -10, 8, -6, 2];
                offsets.forEach((dx, i) => {
                    const b = document.createElement('div');
                    b.className = 'preview-block';
                    b.style.width = '46px';
                    b.style.marginLeft = (dx * 2) + 'px';
                    b.style.background = skin.colorFor ? skin.colorFor(i) :
                        (skin.swatch || '#888');
                    b.style.animationDelay = (i * 0.08) + 's';
                    tower.appendChild(b);
                });
            }

            renderChips();
            renderPreview();
        })();
    </script>
</body>
</html>
