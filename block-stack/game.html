<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="mobile-web-app-capable" content="yes">
    <title>Block Stacker</title>
    <link rel="stylesheet" href="css/common.css">
    <script src="js/blocks.js"></script>
    <script src="../shared/stqry-bridge.js"></script>
    <script src="../shared/chain.js"></script>
    <style>
        .container {
            max-width: 560px;
            text-align: center;
        }

        .topbar {
            display: flex;
            justify-content: space-around;
            gap: 12px;
            margin-bottom: 10px;
        }

        .topbar .stat-value { font-size: 1.6em; }
        .topbar .stat-label { font-size: 0.8em; }

        /* The cabinet — a white card, exactly like the slot machine shell */
        .field-card {
            background: var(--surface);
            border: 1px solid var(--surface-border);
            border-radius: 18px;
            padding: 16px;
            box-shadow: 0 4px 16px rgba(0, 0, 0, 0.10);
            margin: 0 auto;
            position: relative;
        }

        /* The recessed well the play window sits in */
        .well {
            position: relative;
            background: var(--well-bg);
            border-radius: 14px;
            padding: 12px;
            box-shadow: inset 0 2px 8px rgba(0, 0, 0, 0.12);
            line-height: 0;
        }

        #game {
            width: 100%;
            display: block;
            border-radius: 10px;
            background: #cfe6f2;
            box-shadow: inset 0 0 14px rgba(0, 0, 0, 0.10);
            touch-action: manipulation;
            cursor: pointer;
        }


        /* Big floating feedback word (PERFECT! / GREAT! …) */
        .flash {
            position: absolute;
            top: 22%;
            left: 50%;
            transform: translate(-50%, 0);
            font-weight: 800;
            font-size: 1.6em;
            color: var(--accent-strong);
            text-shadow: 0 2px 6px rgba(255, 255, 255, 0.8);
            pointer-events: none;
            opacity: 0;
            z-index: 3;
            line-height: 1;
        }

        .flash.show {
            animation: flashPop 0.7s ease-out;
        }

        @keyframes flashPop {
            0% { opacity: 0; transform: translate(-50%, 10px) scale(0.7); }
            25% { opacity: 1; transform: translate(-50%, 0) scale(1.1); }
            100% { opacity: 0; transform: translate(-50%, -22px) scale(1); }
        }

        .hint {
            color: var(--text-secondary);
            font-size: 0.92em;
            margin: 12px 0 0;
        }

        .back-link {
            display: inline-block;
            margin-top: 14px;
            color: var(--accent);
            text-decoration: none;
            font-weight: 600;
        }
        .back-link:hover { text-decoration: underline; }

        .combo-tag {
            color: var(--good-color);
            font-weight: 800;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="topbar info-panel">
            <div class="stat">
                <div class="stat-label">HEIGHT</div>
                <div class="stat-value" id="scoreVal">0</div>
            </div>
            <div class="stat">
                <div class="stat-label">COMBO</div>
                <div class="stat-value" id="comboVal">—</div>
            </div>
            <div class="stat">
                <div class="stat-label">BEST</div>
                <div class="stat-value" id="bestVal">0</div>
            </div>
        </div>

        <div class="field-card">
            <div class="well">
                <canvas id="game"></canvas>
                <div class="flash" id="flash"></div>
            </div>
        </div>

        <p class="hint">Tap the tower or hit <strong>Space</strong> to drop a block.</p>
    </div>

    <!-- Game over modal -->
    <div class="modal" id="overModal">
        <div class="modal-content">
            <div class="win-message" id="overTitle">Tower Toppled!</div>
            <p id="overText">You stacked 0 blocks.</p>
            <div class="controls">
                <button class="btn btn-primary" id="playAgainBtn">▶ Play Again</button>
                <a href="index.html" class="btn btn-secondary">Menu</a>
            </div>
        </div>
    </div>

    <script>
    (function () {
        'use strict';

        /* ---------------------------------------------------------------
         * Setup & constants
         * ------------------------------------------------------------- */
        const SKIN_KEY = 'blockStack.skin';
        const BEST_KEY = 'blockStack.best';

        // Custom challenge: baked into a standalone page, or carried in ?level=
        const CHALLENGE = (function () {
            if (window.STANDALONE_LEVEL) return window.STANDALONE_LEVEL;
            try {
                const p = new URLSearchParams(location.search).get('level');
                if (p) return JSON.parse(decodeURIComponent(escape(atob(p))));
            } catch (e) { console.error('Invalid challenge data', e); }
            return null;
        })();

        // Positive finite number from the challenge, else the default.
        function tuned(v, def) {
            return (typeof v === 'number' && isFinite(v) && v > 0) ? v : def;
        }

        const canvas = document.getElementById('game');
        const ctx = canvas.getContext('2d');

        const scoreVal = document.getElementById('scoreVal');
        const comboVal = document.getElementById('comboVal');
        const bestVal = document.getElementById('bestVal');
        const flash = document.getElementById('flash');
        const overModal = document.getElementById('overModal');
        const overTitle = document.getElementById('overTitle');
        const overText = document.getElementById('overText');

        // Logical playfield size (CSS pixels). The canvas backing store is
        // scaled by devicePixelRatio for crisp rendering on HiDPI screens.
        const VIEW_W = 360;
        const VIEW_H = 540;

        const BLOCK_W = 72;          // every block is the same (squarish) size
        const BLOCK_H = 60;
        // Slide speed / tolerance defaults, tunable per custom challenge.
        const BASE_SPEED = tuned(CHALLENGE && CHALLENGE.baseSpeed, 120);   // first block, px/sec
        const SPEED_STEP = tuned(CHALLENGE && CHALLENGE.speedStep, 32);    // added after every drop
        const SPEED_MAX = 1000;      // cap so it stays (barely) playable
        const PERFECT_TOL = tuned(CHALLENGE && CHALLENGE.perfectTol, 5);   // px tolerance for "perfect"
        // Blocks to stack to win a challenge (0 = endless, the default game).
        const TARGET_HEIGHT = CHALLENGE ? Math.floor(tuned(CHALLENGE.targetHeight, 0)) : 0;
        const MOVER_TOP_Y = 22;      // screen-space y the slider rides along at the top
        const FALL_GRAVITY = 1500;   // px/sec^2 while a dropped block falls
        const FALL_V0 = 80;          // initial downward speed on release
        const GROUND_Y = VIEW_H - 56; // y of the very bottom block's base line

        // ---- background scene (sky → hills → street) ----
        // How fast the sky deepens with altitude (camera units to full night).
        const SKY_FULL = 1300;
        const SKY_TOP_LOW = [143, 205, 238], SKY_TOP_HIGH = [18, 24, 52];
        const SKY_HOR_LOW = [223, 240, 247], SKY_HOR_HIGH = [70, 92, 140];
        const HILL_DUSK = [40, 48, 72];
        // Fixed twinkling stars (screen-space; they're "infinitely" far away).
        const STARS = Array.from({ length: 46 }, () => ({
            x: Math.random() * VIEW_W,
            y: Math.random() * VIEW_H * 0.72,
            s: Math.random() < 0.3 ? 2 : 1,
        }));
        // A few clouds drifting near the horizon at low altitude.
        const CLOUDS = [
            { x: 50, y: 70, s: 1.1 }, { x: 250, y: 130, s: 1.35 },
            { x: 160, y: 36, s: 0.85 }, { x: 320, y: 90, s: 0.7 },
        ];

        const skinId = (function () {
            const want = CHALLENGE && CHALLENGE.skin;
            if (want && window.BlockSkins.get(want) && window.BlockSkins.get(want).id === want) {
                return want;
            }
            let id = null;
            try { id = localStorage.getItem(SKIN_KEY); } catch (e) {}
            return (id && window.BlockSkins.get(id) &&
                    window.BlockSkins.get(id).id === id) ? id : window.BlockSkins.list()[0].id;
        })();

        let best = parseInt(localStorage.getItem(BEST_KEY) || '0', 10);
        bestVal.textContent = best;

        // Challenge mode: repurpose the BEST pill as the GOAL and show the
        // challenge name in the hint line.
        if (TARGET_HEIGHT) {
            bestVal.parentElement.querySelector('.stat-label').textContent = 'GOAL';
            bestVal.textContent = TARGET_HEIGHT;
            const hintEl = document.querySelector('.hint');
            const nameEl = document.createElement('strong');
            nameEl.textContent = (CHALLENGE.name || 'Challenge') + ' — ';
            hintEl.textContent = 'stack ' + TARGET_HEIGHT + ' blocks to win! Tap the tower or hit Space to drop.';
            hintEl.insertBefore(nameEl, hintEl.firstChild);
            if (CHALLENGE.name) document.title = CHALLENGE.name + ' - Block Stacker';
        }
        // A standalone page has no menu to go back to.
        if (window.STANDALONE_LEVEL) {
            document.querySelectorAll('a[href="index.html"]').forEach(a => { a.style.display = 'none'; });
        }

        /* ---------------------------------------------------------------
         * HiDPI canvas sizing
         * ------------------------------------------------------------- */
        function sizeCanvas() {
            const dpr = window.devicePixelRatio || 1;
            canvas.width = VIEW_W * dpr;
            canvas.height = VIEW_H * dpr;
            canvas.style.height = (canvas.clientWidth * (VIEW_H / VIEW_W)) + 'px';
            ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
        }

        /* ---------------------------------------------------------------
         * Game state
         * ------------------------------------------------------------- */
        let stack;       // placed blocks: { x, index }  (all BLOCK_W wide)
        let mover;       // the active block: { x, dir, speed, phase, screenY, vy }
        let debris;      // blocks that missed and tumble away
        let camera;      // current vertical scroll (world units), eased
        let cameraTarget;
        let score;
        let combo;
        let state;       // 'playing' | 'over'
        let lastT;

        function reset() {
            stack = [{ x: (VIEW_W - BLOCK_W) / 2, index: 0 }];
            debris = [];
            camera = 0;
            cameraTarget = 0;
            score = 0;
            combo = 0;
            state = 'playing';
            spawnMover();
            updateHud();
            overModal.classList.remove('active');
        }

        // The base (bottom) y in WORLD space for the block at the given height
        // level. World y grows downward like screen y; level 0 sits on the
        // ground line and each level stacks BLOCK_H above the previous.
        function baseYForLevel(level) {
            return GROUND_Y - level * BLOCK_H;
        }

        // Slide speed grows with every block already placed.
        function currentSpeed() {
            return Math.min(SPEED_MAX, BASE_SPEED + score * SPEED_STEP);
        }

        function spawnMover() {
            const fromLeft = stack.length % 2 === 0;
            mover = {
                x: fromLeft ? 0 : VIEW_W - BLOCK_W,
                dir: fromLeft ? 1 : -1,
                speed: currentSpeed(),
                phase: 'slide',          // 'slide' at the top, then 'fall'
                screenY: MOVER_TOP_Y,    // screen-space top of the block
                vy: 0,
            };
        }

        /* ---------------------------------------------------------------
         * Dropping: release the block so it falls from the top.
         * ------------------------------------------------------------- */
        function drop() {
            if (state !== 'playing' || !mover || mover.phase !== 'slide') return;
            mover.phase = 'fall';
            mover.vy = FALL_V0;
        }

        // Called once a falling block reaches the top of the stack.
        function land() {
            const below = stack[stack.length - 1];
            const offset = mover.x - below.x;
            const overlap = BLOCK_W - Math.abs(offset);

            if (overlap <= 0) {
                // Missed the tower entirely — let it keep falling and end the run.
                missAndFall();
                return;
            }

            // Full block always stays — no slicing. A tight line-up is "perfect"
            // and snaps flush, building a combo; otherwise it rests where it fell.
            let x = mover.x;
            if (Math.abs(offset) <= PERFECT_TOL) {
                x = below.x;
                combo++;
                showFlash(combo >= 2 ? `PERFECT ×${combo}!` : 'PERFECT!', 'var(--good-color)');
            } else {
                combo = 0;
                const acc = overlap / BLOCK_W;
                if (acc > 0.8) showFlash('GREAT!', 'var(--accent-strong)');
                else if (acc > 0.5) showFlash('GOOD', 'var(--ok-color)');
            }

            stack.push({ x: x, index: stack.length });
            score++;
            updateHud();
            if (TARGET_HEIGHT && score >= TARGET_HEIGHT) {
                challengeWon();
                return;
            }
            spawnMover();
        }

        // Challenge mode: the goal height was reached — the tower is built!
        function challengeWon() {
            mover = null;
            state = 'over';
            updateHud();
            // Trail mode: bank the result for the final overview page.
            if (window.MinigameChain && MinigameChain.active) {
                MinigameChain.report({ points: 100, stars: 3, native: { blocks: score } });
            }
            // Embedded in escape-base: let the host unlock the next door.
            if (window.parent !== window) {
                window.parent.postMessage({ type: 'escape-base:minigame-complete' }, '*');
            }
            overTitle.textContent = (CHALLENGE && CHALLENGE.winTitle) || '🏆 Challenge Complete!';
            overText.textContent = (CHALLENGE && CHALLENGE.winMessage) ||
                ('You stacked all ' + TARGET_HEIGHT + ' blocks!');
            setTimeout(() => overModal.classList.add('active'), 500);
        }

        // The active block missed: hand it to the debris system so it tumbles
        // past the tower, then end the game.
        function missAndFall() {
            debris.push({
                x: mover.x,
                worldY: screenToWorldY(mover.screenY),
                vy: mover.vy,
                vx: (mover.x < VIEW_W / 2 ? -1 : 1) * 30,
                rot: 0,
                vrot: (Math.random() - 0.5) * 3,
                index: stack.length,
                life: 1.4,
            });
            mover = null;
            gameOver();
        }

        // Convert a screen-space y into the world-space y used by debris.
        function screenToWorldY(screenY) {
            return screenY - camera;
        }

        function gameOver() {
            state = 'over';
            combo = 0;
            updateHud();
            if (TARGET_HEIGHT) {
                // Challenge mode: the GOAL pill replaces BEST, so no best-keeping.
                overTitle.textContent = 'Tower Toppled!';
                overText.innerHTML = 'You stacked <strong>' + score + '</strong> of <strong>' +
                    TARGET_HEIGHT + '</strong> blocks. Try again!';
                setTimeout(() => overModal.classList.add('active'), 700);
                return;
            }
            // Trail mode without a goal height: an endless run still counts —
            // every block is worth 5 points, capped at 100 (20+ blocks).
            if (window.MinigameChain && MinigameChain.active && score > 0) {
                const pts = Math.min(100, score * 5);
                MinigameChain.report({
                    points: pts,
                    stars: pts >= 100 ? 3 : pts >= 50 ? 2 : 1,
                    native: { blocks: score }
                });
            }
            const isBest = score > best;
            if (isBest) {
                best = score;
                try { localStorage.setItem(BEST_KEY, String(best)); } catch (e) {}
                bestVal.textContent = best;
            }
            overTitle.textContent = isBest && score > 0 ? 'New Best! 🏆' : 'Tower Toppled!';
            overText.innerHTML = 'You stacked <strong>' + score + '</strong> block' +
                (score === 1 ? '' : 's') + '.';
            // Brief delay so the missed block is seen falling before the modal.
            setTimeout(() => overModal.classList.add('active'), 700);
        }

        /* ---------------------------------------------------------------
         * HUD & feedback
         * ------------------------------------------------------------- */
        function updateHud() {
            scoreVal.textContent = score;
            comboVal.textContent = combo >= 2 ? '×' + combo : '—';
            comboVal.style.color = combo >= 2 ? 'var(--good-color)' : 'var(--text-primary)';
        }

        let flashTimer = null;
        function showFlash(text, color) {
            flash.textContent = text;
            flash.style.color = color || 'var(--accent-strong)';
            flash.classList.remove('show');
            // reflow to restart the animation
            void flash.offsetWidth;
            flash.classList.add('show');
            clearTimeout(flashTimer);
            flashTimer = setTimeout(() => flash.classList.remove('show'), 700);
        }

        /* ---------------------------------------------------------------
         * Update & render loop
         * ------------------------------------------------------------- */
        function update(dt) {
            if (state === 'playing' && mover) {
                if (mover.phase === 'slide') {
                    // Slide back and forth at the top — steady within a block,
                    // but faster with each block already stacked.
                    mover.x += mover.dir * mover.speed * dt;
                    if (mover.x <= 0) { mover.x = 0; mover.dir = 1; }
                    const maxX = VIEW_W - BLOCK_W;
                    if (mover.x >= maxX) { mover.x = maxX; mover.dir = -1; }
                } else {
                    // Falling toward the stack.
                    mover.vy += FALL_GRAVITY * dt;
                    mover.screenY += mover.vy * dt;
                    const landingScreenY = baseYForLevel(stack.length) - BLOCK_H + camera;
                    if (mover.screenY >= landingScreenY) {
                        mover.screenY = landingScreenY;
                        land();
                    }
                }
            }

            // Ease the camera so the top of the tower stays in the lower-middle,
            // leaving plenty of empty sky above for the block to drop through.
            const towerTop = baseYForLevel(stack.length - 1) - BLOCK_H;
            const desiredTopScreen = VIEW_H * 0.6;
            cameraTarget = Math.max(0, desiredTopScreen - towerTop);
            camera += (cameraTarget - camera) * Math.min(1, dt * 6);

            // Advance tumbling debris.
            for (let i = debris.length - 1; i >= 0; i--) {
                const d = debris[i];
                d.vy += FALL_GRAVITY * dt;
                d.worldY += d.vy * dt;
                d.x += d.vx * dt;
                d.rot += d.vrot * dt;
                d.life -= dt * 0.6;
                if (d.worldY + camera > VIEW_H + 120 || d.life <= 0) debris.splice(i, 1);
            }
        }

        /* ---------------------------------------------------------------
         * Background scene — a street backed by rolling hills, climbing up
         * into an ever-deepening sky as the tower (and camera) rises.
         * ------------------------------------------------------------- */
        function mix(a, b, t) {
            return 'rgb(' + Math.round(a[0] + (b[0] - a[0]) * t) + ',' +
                Math.round(a[1] + (b[1] - a[1]) * t) + ',' +
                Math.round(a[2] + (b[2] - a[2]) * t) + ')';
        }

        function drawCloud(x, y, s) {
            ctx.beginPath();
            ctx.arc(x, y, 14 * s, 0, Math.PI * 2);
            ctx.arc(x + 16 * s, y + 4 * s, 11 * s, 0, Math.PI * 2);
            ctx.arc(x - 16 * s, y + 4 * s, 10 * s, 0, Math.PI * 2);
            ctx.arc(x, y + 7 * s, 14 * s, 0, Math.PI * 2);
            ctx.fill();
        }

        // One rolling-hill layer. `f` is its parallax factor (smaller = further
        // away and slower); `col` is mixed toward dusk with altitude.
        function drawHills(f, off, crest, wl, phase, col, p) {
            const base = GROUND_Y + camera * f + off;
            if (base - crest > VIEW_H) return; // entirely below the view
            ctx.fillStyle = mix(col, HILL_DUSK, p * 0.55);
            ctx.beginPath();
            ctx.moveTo(0, VIEW_H);
            for (let x = 0; x <= VIEW_W; x += 10) {
                ctx.lineTo(x, base - crest * (0.5 + 0.5 * Math.sin(x / wl + phase)));
            }
            ctx.lineTo(VIEW_W, VIEW_H);
            ctx.closePath();
            ctx.fill();
        }

        function drawStreet() {
            const gy = GROUND_Y + camera; // the line the houses stand on
            if (gy > VIEW_H) return;      // street has scrolled below the view
            const h = VIEW_H - gy;
            ctx.fillStyle = '#6f7681';                 // asphalt
            ctx.fillRect(0, gy, VIEW_W, h);
            ctx.fillStyle = '#b9bcc2';                 // kerb
            ctx.fillRect(0, gy, VIEW_W, 5);
            ctx.fillStyle = '#565c66';
            ctx.fillRect(0, gy + 5, VIEW_W, 2);
            if (h > 18) {                              // centre line
                ctx.strokeStyle = 'rgba(240, 222, 120, 0.85)';
                ctx.lineWidth = 3;
                ctx.setLineDash([14, 12]);
                ctx.beginPath();
                ctx.moveTo(0, gy + h * 0.62);
                ctx.lineTo(VIEW_W, gy + h * 0.62);
                ctx.stroke();
                ctx.setLineDash([]);
            }
        }

        function drawBackground() {
            const p = Math.min(1, Math.max(0, camera) / SKY_FULL);

            // Sky
            const g = ctx.createLinearGradient(0, 0, 0, VIEW_H);
            g.addColorStop(0, mix(SKY_TOP_LOW, SKY_TOP_HIGH, p));
            g.addColorStop(1, mix(SKY_HOR_LOW, SKY_HOR_HIGH, p));
            ctx.fillStyle = g;
            ctx.fillRect(0, 0, VIEW_W, VIEW_H);

            // Sun, sinking and fading as you climb
            if (p < 0.96) {
                const sx = VIEW_W * 0.76, sy = 64 + camera * 0.12;
                const sg = ctx.createRadialGradient(sx, sy, 4, sx, sy, 48);
                sg.addColorStop(0, 'rgba(255, 248, 218, ' + (0.95 * (1 - p)) + ')');
                sg.addColorStop(1, 'rgba(255, 248, 218, 0)');
                ctx.fillStyle = sg;
                ctx.beginPath();
                ctx.arc(sx, sy, 48, 0, Math.PI * 2);
                ctx.fill();
            }

            // Stars fade in with altitude
            if (p > 0.32) {
                ctx.save();
                ctx.globalAlpha = Math.min(1, (p - 0.32) / 0.5) * 0.9;
                ctx.fillStyle = '#fff';
                for (const s of STARS) ctx.fillRect(s.x, s.y, s.s, s.s);
                ctx.restore();
            }

            // Clouds drift near the horizon, fading out as you rise
            if (p < 0.82) {
                ctx.save();
                ctx.globalAlpha = (1 - p / 0.82) * 0.85;
                ctx.fillStyle = '#ffffff';
                for (const c of CLOUDS) {
                    const yy = c.y + camera * 0.32;
                    if (yy > -40 && yy < VIEW_H + 40) drawCloud(c.x, yy, c.s);
                }
                ctx.restore();
            }

            // Rolling hills (far → near)
            drawHills(0.45, -18, 88, 92, 0.0, [183, 201, 176], p);
            drawHills(0.62, -6, 62, 64, 1.7, [156, 187, 134], p);
            drawHills(0.80, 6, 44, 46, 3.1, [125, 168, 106], p);

            // The street at the base
            drawStreet();
        }

        function render() {
            drawBackground();

            if (state === 'playing') drawDropLine();

            // Placed blocks.
            for (const b of stack) {
                const y = baseYForLevel(b.index) - BLOCK_H + camera;
                if (y > VIEW_H + 40) continue; // scrolled off the bottom — skip
                window.BlockSkins.draw(ctx, { x: b.x, y: y, w: BLOCK_W, h: BLOCK_H }, b.index, skinId);
            }

            // Tumbling debris (slightly faded).
            for (const d of debris) {
                ctx.save();
                ctx.globalAlpha = Math.max(0, Math.min(1, d.life));
                ctx.translate(d.x + BLOCK_W / 2, d.worldY + camera + BLOCK_H / 2);
                ctx.rotate(d.rot);
                window.BlockSkins.draw(
                    ctx,
                    { x: -BLOCK_W / 2, y: -BLOCK_H / 2, w: BLOCK_W, h: BLOCK_H },
                    d.index, skinId
                );
                ctx.restore();
            }

            // The active block (sliding at the top, or mid-fall).
            if (state === 'playing' && mover) {
                const below = stack[stack.length - 1];

                // Dashed guide lines from the target block up to the slider, so
                // the landing spot is easy to read (slot-machine yellow).
                const belowTopY = baseYForLevel(below.index) - BLOCK_H + camera;
                ctx.save();
                ctx.strokeStyle = 'rgba(226, 163, 28, 0.35)';
                ctx.setLineDash([4, 5]);
                ctx.lineWidth = 1;
                ctx.beginPath();
                ctx.moveTo(below.x, 0);
                ctx.lineTo(below.x, belowTopY);
                ctx.moveTo(below.x + BLOCK_W, 0);
                ctx.lineTo(below.x + BLOCK_W, belowTopY);
                ctx.stroke();
                ctx.restore();

                window.BlockSkins.draw(ctx, { x: mover.x, y: mover.screenY, w: BLOCK_W, h: BLOCK_H },
                    stack.length, skinId);
            }
        }

        // A slot-machine-style "drop line" framing the lane the block slides
        // along at the very top — two glowing accent rails like the payline.
        function drawDropLine() {
            const y0 = MOVER_TOP_Y - 6;
            const y1 = MOVER_TOP_Y + BLOCK_H + 6;
            ctx.save();
            ctx.strokeStyle = 'rgba(226, 163, 28, 0.9)';
            ctx.lineWidth = 3;
            ctx.shadowColor = 'rgba(226, 163, 28, 0.45)';
            ctx.shadowBlur = 8;
            ctx.beginPath();
            ctx.moveTo(0, y0); ctx.lineTo(VIEW_W, y0);
            ctx.moveTo(0, y1); ctx.lineTo(VIEW_W, y1);
            ctx.stroke();
            ctx.restore();
        }

        function frame(t) {
            if (!lastT) lastT = t;
            let dt = (t - lastT) / 1000;
            lastT = t;
            if (dt > 0.05) dt = 0.05; // clamp after tab switches
            update(dt);
            render();
            requestAnimationFrame(frame);
        }

        /* ---------------------------------------------------------------
         * Input
         * ------------------------------------------------------------- */
        function onTap(e) {
            if (state === 'over') return;
            e.preventDefault();
            drop();
        }

        canvas.addEventListener('pointerdown', onTap);
        document.getElementById('playAgainBtn').addEventListener('click', reset);

        window.addEventListener('keydown', (e) => {
            if (e.code === 'Space' || e.code === 'Enter') {
                e.preventDefault();
                if (state === 'playing') drop();
                else reset();
            }
        });

        window.addEventListener('resize', sizeCanvas);

        /* ---------------------------------------------------------------
         * Go!
         * ------------------------------------------------------------- */
        sizeCanvas();
        reset();
        requestAnimationFrame(frame);
    })();
    </script>
</body>
</html>
