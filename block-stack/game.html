<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="mobile-web-app-capable" content="yes">
    <title>Block Stacker</title>
    <link rel="stylesheet" href="css/common.css">
    <script src="js/blocks.js"></script>
    <style>
        .container {
            max-width: 560px;
            text-align: center;
        }

        .topbar {
            display: flex;
            justify-content: space-around;
            gap: 12px;
            margin-bottom: 10px;
        }

        .topbar .stat-value { font-size: 1.6em; }
        .topbar .stat-label { font-size: 0.8em; }

        /* The playfield — a white card holding the canvas */
        .field-card {
            background: var(--surface);
            border: 1px solid var(--surface-border);
            border-radius: 18px;
            padding: 10px;
            box-shadow: 0 8px 26px rgba(0, 0, 0, 0.12);
            margin: 0 auto;
            position: relative;
            line-height: 0;
        }

        #game {
            width: 100%;
            display: block;
            border-radius: 12px;
            background: linear-gradient(180deg, var(--field-top) 0%, var(--field-bottom) 100%);
            touch-action: manipulation;
            cursor: pointer;
        }

        /* Big floating feedback word (PERFECT! / GREAT! …) */
        .flash {
            position: absolute;
            top: 18%;
            left: 50%;
            transform: translate(-50%, 0);
            font-weight: 800;
            font-size: 1.6em;
            color: var(--accent-strong);
            text-shadow: 0 2px 6px rgba(255, 255, 255, 0.8);
            pointer-events: none;
            opacity: 0;
        }

        .flash.show {
            animation: flashPop 0.7s ease-out;
        }

        @keyframes flashPop {
            0% { opacity: 0; transform: translate(-50%, 10px) scale(0.7); }
            25% { opacity: 1; transform: translate(-50%, 0) scale(1.1); }
            100% { opacity: 0; transform: translate(-50%, -22px) scale(1); }
        }

        .hint {
            color: var(--text-secondary);
            font-size: 0.92em;
            margin: 12px 0 0;
        }

        .back-link {
            display: inline-block;
            margin-top: 14px;
            color: var(--accent);
            text-decoration: none;
            font-weight: 600;
        }
        .back-link:hover { text-decoration: underline; }

        .combo-tag {
            color: var(--good-color);
            font-weight: 800;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="topbar info-panel">
            <div class="stat">
                <div class="stat-label">HEIGHT</div>
                <div class="stat-value" id="scoreVal">0</div>
            </div>
            <div class="stat">
                <div class="stat-label">COMBO</div>
                <div class="stat-value" id="comboVal">—</div>
            </div>
            <div class="stat">
                <div class="stat-label">BEST</div>
                <div class="stat-value" id="bestVal">0</div>
            </div>
        </div>

        <div class="field-card">
            <canvas id="game"></canvas>
            <div class="flash" id="flash"></div>
        </div>

        <div class="controls">
            <button class="btn btn-primary" id="dropBtn">⬇ Drop</button>
            <button class="btn btn-secondary" id="restartBtn">↻ Restart</button>
        </div>

        <p class="hint">Tap the tower, press the Drop button, or hit <strong>Space</strong> to drop a block.</p>
        <a href="index.html" class="back-link">← Back to menu</a>
    </div>

    <!-- Game over modal -->
    <div class="modal" id="overModal">
        <div class="modal-content">
            <div class="win-message" id="overTitle">Tower Toppled!</div>
            <p id="overText">You stacked 0 blocks.</p>
            <div class="controls">
                <button class="btn btn-primary" id="playAgainBtn">▶ Play Again</button>
                <a href="index.html" class="btn btn-secondary">Menu</a>
            </div>
        </div>
    </div>

    <script>
    (function () {
        'use strict';

        /* ---------------------------------------------------------------
         * Setup & constants
         * ------------------------------------------------------------- */
        const SKIN_KEY = 'blockStack.skin';
        const BEST_KEY = 'blockStack.best';

        const canvas = document.getElementById('game');
        const ctx = canvas.getContext('2d');

        const scoreVal = document.getElementById('scoreVal');
        const comboVal = document.getElementById('comboVal');
        const bestVal = document.getElementById('bestVal');
        const flash = document.getElementById('flash');
        const overModal = document.getElementById('overModal');
        const overTitle = document.getElementById('overTitle');
        const overText = document.getElementById('overText');

        // Logical playfield size (CSS pixels). The canvas backing store is
        // scaled by devicePixelRatio for crisp rendering on HiDPI screens.
        const VIEW_W = 360;
        const VIEW_H = 540;

        const BLOCK_W = 72;          // every block is the same (squarish) size
        const BLOCK_H = 60;
        const BASE_SPEED = 120;      // slide speed of the first block, px/sec
        const SPEED_STEP = 16;       // added to slide speed after every drop
        const SPEED_MAX = 470;       // cap so it stays (barely) playable
        const PERFECT_TOL = 5;       // px tolerance for a "perfect" line-up
        const MOVER_TOP_Y = 22;      // screen-space y the slider rides along at the top
        const FALL_GRAVITY = 1500;   // px/sec^2 while a dropped block falls
        const FALL_V0 = 80;          // initial downward speed on release
        const GROUND_Y = VIEW_H - 56; // y of the very bottom block's base line

        const skinId = (function () {
            const id = localStorage.getItem(SKIN_KEY);
            return (id && window.BlockSkins.get(id) &&
                    window.BlockSkins.get(id).id === id) ? id : window.BlockSkins.list()[0].id;
        })();

        let best = parseInt(localStorage.getItem(BEST_KEY) || '0', 10);
        bestVal.textContent = best;

        /* ---------------------------------------------------------------
         * HiDPI canvas sizing
         * ------------------------------------------------------------- */
        function sizeCanvas() {
            const dpr = window.devicePixelRatio || 1;
            canvas.width = VIEW_W * dpr;
            canvas.height = VIEW_H * dpr;
            canvas.style.height = (canvas.clientWidth * (VIEW_H / VIEW_W)) + 'px';
            ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
        }

        /* ---------------------------------------------------------------
         * Game state
         * ------------------------------------------------------------- */
        let stack;       // placed blocks: { x, index }  (all BLOCK_W wide)
        let mover;       // the active block: { x, dir, speed, phase, screenY, vy }
        let debris;      // blocks that missed and tumble away
        let camera;      // current vertical scroll (world units), eased
        let cameraTarget;
        let score;
        let combo;
        let state;       // 'playing' | 'over'
        let lastT;

        function reset() {
            stack = [{ x: (VIEW_W - BLOCK_W) / 2, index: 0 }];
            debris = [];
            camera = 0;
            cameraTarget = 0;
            score = 0;
            combo = 0;
            state = 'playing';
            spawnMover();
            updateHud();
            overModal.classList.remove('active');
        }

        // The base (bottom) y in WORLD space for the block at the given height
        // level. World y grows downward like screen y; level 0 sits on the
        // ground line and each level stacks BLOCK_H above the previous.
        function baseYForLevel(level) {
            return GROUND_Y - level * BLOCK_H;
        }

        // Slide speed grows with every block already placed.
        function currentSpeed() {
            return Math.min(SPEED_MAX, BASE_SPEED + score * SPEED_STEP);
        }

        function spawnMover() {
            const fromLeft = stack.length % 2 === 0;
            mover = {
                x: fromLeft ? 0 : VIEW_W - BLOCK_W,
                dir: fromLeft ? 1 : -1,
                speed: currentSpeed(),
                phase: 'slide',          // 'slide' at the top, then 'fall'
                screenY: MOVER_TOP_Y,    // screen-space top of the block
                vy: 0,
            };
        }

        /* ---------------------------------------------------------------
         * Dropping: release the block so it falls from the top.
         * ------------------------------------------------------------- */
        function drop() {
            if (state !== 'playing' || !mover || mover.phase !== 'slide') return;
            mover.phase = 'fall';
            mover.vy = FALL_V0;
        }

        // Called once a falling block reaches the top of the stack.
        function land() {
            const below = stack[stack.length - 1];
            const offset = mover.x - below.x;
            const overlap = BLOCK_W - Math.abs(offset);

            if (overlap <= 0) {
                // Missed the tower entirely — let it keep falling and end the run.
                missAndFall();
                return;
            }

            // Full block always stays — no slicing. A tight line-up is "perfect"
            // and snaps flush, building a combo; otherwise it rests where it fell.
            let x = mover.x;
            if (Math.abs(offset) <= PERFECT_TOL) {
                x = below.x;
                combo++;
                showFlash(combo >= 2 ? `PERFECT ×${combo}!` : 'PERFECT!', 'var(--good-color)');
            } else {
                combo = 0;
                const acc = overlap / BLOCK_W;
                if (acc > 0.8) showFlash('GREAT!', 'var(--accent-strong)');
                else if (acc > 0.5) showFlash('GOOD', 'var(--ok-color)');
            }

            stack.push({ x: x, index: stack.length });
            score++;
            updateHud();
            spawnMover();
        }

        // The active block missed: hand it to the debris system so it tumbles
        // past the tower, then end the game.
        function missAndFall() {
            debris.push({
                x: mover.x,
                worldY: screenToWorldY(mover.screenY),
                vy: mover.vy,
                vx: (mover.x < VIEW_W / 2 ? -1 : 1) * 30,
                rot: 0,
                vrot: (Math.random() - 0.5) * 3,
                index: stack.length,
                life: 1.4,
            });
            mover = null;
            gameOver();
        }

        // Convert a screen-space y into the world-space y used by debris.
        function screenToWorldY(screenY) {
            return screenY - camera;
        }

        function gameOver() {
            state = 'over';
            combo = 0;
            updateHud();
            const isBest = score > best;
            if (isBest) {
                best = score;
                localStorage.setItem(BEST_KEY, String(best));
                bestVal.textContent = best;
            }
            overTitle.textContent = isBest && score > 0 ? 'New Best! 🏆' : 'Tower Toppled!';
            overText.innerHTML = 'You stacked <strong>' + score + '</strong> block' +
                (score === 1 ? '' : 's') + '.';
            // Brief delay so the missed block is seen falling before the modal.
            setTimeout(() => overModal.classList.add('active'), 700);
        }

        /* ---------------------------------------------------------------
         * HUD & feedback
         * ------------------------------------------------------------- */
        function updateHud() {
            scoreVal.textContent = score;
            comboVal.textContent = combo >= 2 ? '×' + combo : '—';
            comboVal.style.color = combo >= 2 ? 'var(--good-color)' : 'var(--text-primary)';
        }

        let flashTimer = null;
        function showFlash(text, color) {
            flash.textContent = text;
            flash.style.color = color || 'var(--accent-strong)';
            flash.classList.remove('show');
            // reflow to restart the animation
            void flash.offsetWidth;
            flash.classList.add('show');
            clearTimeout(flashTimer);
            flashTimer = setTimeout(() => flash.classList.remove('show'), 700);
        }

        /* ---------------------------------------------------------------
         * Update & render loop
         * ------------------------------------------------------------- */
        function update(dt) {
            if (state === 'playing' && mover) {
                if (mover.phase === 'slide') {
                    // Slide back and forth at the top — steady within a block,
                    // but faster with each block already stacked.
                    mover.x += mover.dir * mover.speed * dt;
                    if (mover.x <= 0) { mover.x = 0; mover.dir = 1; }
                    const maxX = VIEW_W - BLOCK_W;
                    if (mover.x >= maxX) { mover.x = maxX; mover.dir = -1; }
                } else {
                    // Falling toward the stack.
                    mover.vy += FALL_GRAVITY * dt;
                    mover.screenY += mover.vy * dt;
                    const landingScreenY = baseYForLevel(stack.length) - BLOCK_H + camera;
                    if (mover.screenY >= landingScreenY) {
                        mover.screenY = landingScreenY;
                        land();
                    }
                }
            }

            // Ease the camera so the top of the tower stays in the lower-middle,
            // leaving plenty of empty sky above for the block to drop through.
            const towerTop = baseYForLevel(stack.length - 1) - BLOCK_H;
            const desiredTopScreen = VIEW_H * 0.6;
            cameraTarget = Math.max(0, desiredTopScreen - towerTop);
            camera += (cameraTarget - camera) * Math.min(1, dt * 6);

            // Advance tumbling debris.
            for (let i = debris.length - 1; i >= 0; i--) {
                const d = debris[i];
                d.vy += FALL_GRAVITY * dt;
                d.worldY += d.vy * dt;
                d.x += d.vx * dt;
                d.rot += d.vrot * dt;
                d.life -= dt * 0.6;
                if (d.worldY + camera > VIEW_H + 120 || d.life <= 0) debris.splice(i, 1);
            }
        }

        function render() {
            ctx.clearRect(0, 0, VIEW_W, VIEW_H);

            // Placed blocks.
            for (const b of stack) {
                const y = baseYForLevel(b.index) - BLOCK_H + camera;
                if (y > VIEW_H + 40) continue; // scrolled off the bottom — skip
                window.BlockSkins.draw(ctx, { x: b.x, y: y, w: BLOCK_W, h: BLOCK_H }, b.index, skinId);
            }

            // Tumbling debris (slightly faded).
            for (const d of debris) {
                ctx.save();
                ctx.globalAlpha = Math.max(0, Math.min(1, d.life));
                ctx.translate(d.x + BLOCK_W / 2, d.worldY + camera + BLOCK_H / 2);
                ctx.rotate(d.rot);
                window.BlockSkins.draw(
                    ctx,
                    { x: -BLOCK_W / 2, y: -BLOCK_H / 2, w: BLOCK_W, h: BLOCK_H },
                    d.index, skinId
                );
                ctx.restore();
            }

            // The active block (sliding at the top, or mid-fall).
            if (state === 'playing' && mover) {
                const below = stack[stack.length - 1];

                // Dashed guide lines from the target block up to the slider, so
                // the landing spot is easy to read.
                const belowTopY = baseYForLevel(below.index) - BLOCK_H + camera;
                ctx.save();
                ctx.strokeStyle = 'rgba(63, 108, 246, 0.22)';
                ctx.setLineDash([4, 5]);
                ctx.lineWidth = 1;
                ctx.beginPath();
                ctx.moveTo(below.x, 0);
                ctx.lineTo(below.x, belowTopY);
                ctx.moveTo(below.x + BLOCK_W, 0);
                ctx.lineTo(below.x + BLOCK_W, belowTopY);
                ctx.stroke();
                ctx.restore();

                window.BlockSkins.draw(ctx, { x: mover.x, y: mover.screenY, w: BLOCK_W, h: BLOCK_H },
                    stack.length, skinId);
            }
        }

        function frame(t) {
            if (!lastT) lastT = t;
            let dt = (t - lastT) / 1000;
            lastT = t;
            if (dt > 0.05) dt = 0.05; // clamp after tab switches
            update(dt);
            render();
            requestAnimationFrame(frame);
        }

        /* ---------------------------------------------------------------
         * Input
         * ------------------------------------------------------------- */
        function onTap(e) {
            if (state === 'over') return;
            e.preventDefault();
            drop();
        }

        canvas.addEventListener('pointerdown', onTap);
        document.getElementById('dropBtn').addEventListener('click', () => {
            if (state === 'playing') drop();
        });
        document.getElementById('restartBtn').addEventListener('click', reset);
        document.getElementById('playAgainBtn').addEventListener('click', reset);

        window.addEventListener('keydown', (e) => {
            if (e.code === 'Space' || e.code === 'Enter') {
                e.preventDefault();
                if (state === 'playing') drop();
                else reset();
            }
        });

        window.addEventListener('resize', sizeCanvas);

        /* ---------------------------------------------------------------
         * Go!
         * ------------------------------------------------------------- */
        sizeCanvas();
        reset();
        requestAnimationFrame(frame);
    })();
    </script>
</body>
</html>
