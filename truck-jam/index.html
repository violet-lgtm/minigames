<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="mobile-web-app-capable" content="yes">
    <title>Truck Jam - European Lorry Yard Puzzle</title>
    <link rel="stylesheet" href="css/common.css">
    <script src="../shared/i18n.js"></script>
    <script src="js/i18n.js"></script>
    <script src="js/core/engine.js"></script>
    <script src="js/core/levels.js"></script>
    <script src="js/core/storage.js"></script>
    <style>
        .menu-container { max-width: 620px; text-align: center; }

        .lead { max-width: 520px; margin: 0 auto 18px; }

        .play-row { margin: 8px 0 26px; }

        /* mini animated preview of a jammed yard */
        .preview-cabinet {
            background: var(--surface);
            border: 1px solid var(--surface-border);
            border-radius: 18px;
            padding: 16px;
            box-shadow: 0 4px 16px rgba(0,0,0,0.10);
            max-width: 260px;
            margin: 8px auto 24px;
        }
        .mini-yard {
            position: relative;
            width: 100%;
            aspect-ratio: 1 / 1;
            border-radius: 12px;
            background:
                repeating-linear-gradient(90deg, transparent 0 calc(100%/6 - 2px), rgba(255,255,255,0.10) calc(100%/6 - 2px) calc(100%/6)),
                linear-gradient(160deg, #5a5f66, #494e54);
            box-shadow: inset 0 0 0 3px rgba(0,0,0,0.18);
            overflow: hidden;
        }
        .mini-truck { position: absolute; border-radius: 6px; box-shadow: inset 0 0 0 1px rgba(0,0,0,0.25), inset 0 4px 6px rgba(255,255,255,0.15); }
        .mini-truck.t { box-shadow: inset 0 0 0 2px rgba(255,255,255,0.5), 0 0 6px rgba(226,59,46,0.6); animation: nudge 2.4s ease-in-out infinite; }
        @keyframes nudge { 0%,70%,100% { transform: translateX(0);} 82% { transform: translateX(14%);} }

        /* level grid */
        .level-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(120px, 1fr));
            gap: 12px;
            margin: 10px auto 8px;
            max-width: 560px;
        }
        .level-card {
            background: var(--surface);
            border: 1px solid var(--surface-border);
            border-radius: 14px;
            padding: 14px 12px;
            text-decoration: none;
            color: inherit;
            text-align: left;
            transition: transform 0.15s, box-shadow 0.2s, border-color 0.15s;
            box-shadow: 0 1px 4px rgba(0,0,0,0.06);
            display: block;
        }
        .level-card:hover { transform: translateY(-3px); box-shadow: 0 8px 20px rgba(0,0,0,0.14); border-color: var(--accent); }
        .level-card .num { font-size: 0.75em; color: var(--text-secondary); font-weight: 700; }
        .level-card .nm { font-size: 1.05em; font-weight: 800; margin: 2px 0 6px; color: var(--text-primary); }
        .level-card .meta { font-size: 0.8em; color: var(--text-secondary); display: flex; justify-content: space-between; }
        .level-card .stars { letter-spacing: 1px; }
        .level-card.cleared { border-left: 4px solid var(--good-color); }

        .feature-list { text-align: left; margin: 24px auto 6px; max-width: 520px; list-style: none; }
        .feature-list li { color: var(--text-secondary); margin: 10px 0; font-size: 1.0em; padding-left: 26px; position: relative; }
        .feature-list li::before { content: "🚛"; position: absolute; left: 0; }

        .progress-note { color: var(--text-secondary); font-size: 0.9em; margin: 6px 0 0; }
    </style>
</head>
<body>
    <div class="container menu-container">
        <header>
            <h1>🚛 Truck Jam</h1>
            <p class="lead" data-i18n="lead">The depot is jammed with European lorries. Slide the trucks out of the way — each one only rolls along its own length — and clear a lane so your red lorry can reach the exit gate.</p>
        </header>

        <div class="preview-cabinet">
            <div class="mini-yard" id="miniYard"></div>
        </div>

        <div class="play-row">
            <a href="game.html" class="btn btn-primary menu-btn" id="playBtn" data-i18n="play">🎮 Play</a>
            <a href="editor.html" class="btn btn-secondary menu-btn" data-i18n="create">🔧 Create a Yard</a>
        </div>

        <h2 data-i18n="choose">Choose a yard</h2>
        <div class="level-grid" id="levelGrid"></div>
        <p class="progress-note" id="progressNote"></p>

        <ul class="feature-list" id="featureList"></ul>
    </div>

    <script>
    (function () {
        const Levels = window.TruckJamLevels;
        const Store = window.TruckJamStore;
        const I = window.TruckI18n;

        function starsFor(used, par) {
            if (used <= par) return 3;
            if (used <= Math.ceil(par * 1.5)) return 2;
            return 1;
        }

        // ----- feature list -----
        const featureList = document.getElementById('featureList');
        function renderFeatures() {
            featureList.innerHTML = '';
            (I.tf('feat') || []).forEach((f) => {
                const li = document.createElement('li');
                li.textContent = f;
                featureList.appendChild(li);
            });
        }

        // ----- level cards -----
        const grid = document.getElementById('levelGrid');
        function renderCards() {
            grid.innerHTML = '';
            Levels.forEach((lvl, i) => {
                const a = document.createElement('a');
                const cleared = Store.isCleared(lvl.id);
                const best = Store.getBest(lvl.id);
                a.href = 'game.html?level=' + lvl.id;
                a.className = 'level-card' + (cleared ? ' cleared' : '');
                let starsHtml = '';
                if (cleared && best !== null) {
                    const s = starsFor(best, lvl.par);
                    starsHtml = '⭐'.repeat(s) + '☆'.repeat(3 - s);
                } else {
                    starsHtml = '☆☆☆';
                }
                a.innerHTML =
                    '<div class="num">' + I.t('card_yard', { n: i + 1 }) + '</div>' +
                    '<div class="nm">' + lvl.name + '</div>' +
                    '<div class="meta"><span class="stars">' + starsHtml + '</span>' +
                    '<span>' + I.t('card_par', { par: lvl.par }) +
                    (best !== null ? ' &middot; ' + I.t('card_best', { best: best }) : '') + '</span></div>';
                grid.appendChild(a);
            });
            document.getElementById('progressNote').textContent =
                I.t('progress', { done: Store.clearedCount(), total: Levels.length });
        }

        I.onChange(() => { renderFeatures(); renderCards(); });
        renderFeatures();
        renderCards();

        // ----- mini animated preview using the first level's layout -----
        const mini = document.getElementById('miniYard');
        const demo = Levels[Math.min(2, Levels.length - 1)];
        demo.vehicles.forEach(v => {
            const d = document.createElement('div');
            d.className = 'mini-truck' + (v.isTarget ? ' t' : '');
            d.style.left = (v.x / 6 * 100) + '%';
            d.style.top = (v.y / 6 * 100) + '%';
            d.style.width = ((v.dir === 'h' ? v.len : 1) / 6 * 100) + '%';
            d.style.height = ((v.dir === 'v' ? v.len : 1) / 6 * 100) + '%';
            d.style.background = 'linear-gradient(155deg, rgba(255,255,255,0.30), rgba(0,0,0,0) 45%, rgba(0,0,0,0.26)), ' + v.color;
            d.style.transform = '';
            // inset for a small gap
            d.style.boxSizing = 'border-box';
            d.style.border = '3px solid transparent';
            d.style.backgroundClip = 'padding-box';
            mini.appendChild(d);
        });
    })();
    </script>
</body>
</html>
