<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="mobile-web-app-capable" content="yes">
    <title>Reaction Slots - Round Designer</title>
    <link rel="stylesheet" href="css/common.css">
    <style>
        .container { max-width: 560px; }

        h1 { text-align: center; font-size: 1.5em; margin-bottom: 4px; color: var(--text-primary); }
        .sub { text-align: center; color: var(--text-secondary); margin-bottom: 14px; font-size: 0.92em; }

        .form-grid { display: flex; flex-direction: column; gap: 12px; text-align: left; }
        .form-row { display: flex; gap: 12px; }
        .form-row > div { flex: 1; }
        .form-grid label { font-size: 0.85em; font-weight: 700; color: var(--text-secondary); display: block; margin-bottom: 3px; }
        .form-grid input, .form-grid select {
            width: 100%;
            box-sizing: border-box;
            border: 1px solid var(--surface-border);
            border-radius: 10px;
            padding: 10px 12px;
            font: inherit;
            background: var(--surface);
            color: var(--text-primary);
        }
        .field-hint { font-size: 0.78em; color: var(--text-secondary); margin-top: 3px; }

        /* live symbol preview */
        .symbol-row { display: flex; flex-wrap: wrap; gap: 8px; margin-top: 6px; }
        .symbol-chip {
            font-size: 1.5em;
            padding: 6px 10px;
            background: var(--well-bg);
            border-radius: 10px;
            border: 2px solid transparent;
            line-height: 1;
        }
        .symbol-chip.goal {
            border-color: var(--accent-strong);
            box-shadow: 0 0 8px rgba(226, 163, 28, 0.5);
        }

        .error-note { color: var(--miss-color); font-weight: 700; font-size: 0.85em; min-height: 1.2em; margin-top: 4px; }

        .actions { display: flex; flex-direction: column; gap: 10px; margin: 14px 0; }
    </style>
</head>
<body>
    <div class="container">
        <h1>🔧 Round Designer</h1>
        <p class="sub">Create your own Reaction Slots round — your symbols, your speed</p>

        <div class="info-panel form-grid">
            <div>
                <label for="name">Round name</label>
                <input type="text" id="name" maxlength="48" placeholder="My Slots Round" value="My Slots Round">
            </div>
            <div>
                <label for="symbols">Reel symbols (3-12, separated by spaces)</label>
                <input type="text" id="symbols" value="7️⃣ 🍒 🔔 ⭐ 🍋 💎 🍉">
                <p class="field-hint">Emoji work best. The glowing one is the goal.</p>
                <div class="symbol-row" id="symbolRow"></div>
                <p class="error-note" id="symbolError"></p>
            </div>
            <div class="form-row">
                <div>
                    <label for="targetSelect">Goal symbol</label>
                    <select id="targetSelect"></select>
                </div>
                <div>
                    <label for="reels">Number of reels (1-6)</label>
                    <input type="number" id="reels" min="1" max="6" value="3">
                </div>
            </div>
            <div class="form-row">
                <div>
                    <label for="speedStart">First reel speed (0.2-1.5)</label>
                    <input type="number" id="speedStart" min="0.2" max="1.5" step="0.05" value="0.55">
                </div>
                <div>
                    <label for="speedStep">Speed-up per reel (0-0.5)</label>
                    <input type="number" id="speedStep" min="0" max="0.5" step="0.01" value="0.11">
                </div>
            </div>
            <div>
                <label for="winMessage">Win message (shown when every reel hits the goal)</label>
                <input type="text" id="winMessage" maxlength="120" placeholder="You nailed every reel!">
            </div>
        </div>

        <div class="actions">
            <button class="btn btn-primary" id="testBtn">▶️ Test Round</button>
            <button class="btn btn-secondary" id="shareBtn">🔗 Copy Share Link</button>
            <button class="btn btn-secondary" id="standaloneBtn">📦 Download Standalone Page</button>
        </div>

        <div class="controls" style="text-align:center">
            <a href="index.html" class="btn btn-secondary">☰ Back to Menu</a>
        </div>
    </div>

    <script type="module">
        import { exportStandalonePage } from '../shared/standalone.js';

        const $ = id => document.getElementById(id);
        let targetIndex = 0;

        function parseSymbols() {
            return $('symbols').value.trim().split(/\s+/).filter(Boolean).slice(0, 12);
        }

        function refreshSymbols() {
            const syms = parseSymbols();
            const err = $('symbolError');
            err.textContent = syms.length < 3 ? 'Enter at least 3 symbols.' : '';

            if (targetIndex >= syms.length) targetIndex = 0;

            const sel = $('targetSelect');
            sel.innerHTML = '';
            syms.forEach((s, i) => sel.appendChild(new Option(s, i)));
            sel.value = targetIndex;

            const row = $('symbolRow');
            row.innerHTML = '';
            syms.forEach((s, i) => {
                const chip = document.createElement('button');
                chip.type = 'button';
                chip.className = 'symbol-chip' + (i === targetIndex ? ' goal' : '');
                chip.textContent = s;
                chip.title = 'Set as goal symbol';
                chip.addEventListener('click', () => {
                    targetIndex = i;
                    refreshSymbols();
                });
                row.appendChild(chip);
            });
            return syms;
        }

        $('symbols').addEventListener('input', refreshSymbols);
        $('targetSelect').addEventListener('change', (e) => {
            targetIndex = parseInt(e.target.value, 10) || 0;
            refreshSymbols();
        });
        refreshSymbols();

        function clampNum(id, min, max, def) {
            const n = parseFloat($(id).value);
            const v = isNaN(n) ? def : Math.max(min, Math.min(max, n));
            $(id).value = v;
            return v;
        }

        function getLevelData() {
            const symbols = parseSymbols();
            if (symbols.length < 3) return null;
            const reels = Math.round(clampNum('reels', 1, 6, 3));
            const start = clampNum('speedStart', 0.2, 1.5, 0.55);
            const step = clampNum('speedStep', 0, 0.5, 0.11);
            const speeds = [];
            for (let i = 0; i < reels; i++) speeds.push(Math.round((start + i * step) * 100) / 100);
            return {
                id: 'custom-' + Date.now(),
                name: $('name').value.trim() || 'Custom Round',
                symbols,
                targetIndex,
                reels,
                speeds,
                winMessage: $('winMessage').value.trim() || null,
            };
        }

        function requireValid() {
            const level = getLevelData();
            if (!level) alert('Please enter at least 3 reel symbols.');
            return level;
        }

        function encodeLevel(level) {
            return btoa(unescape(encodeURIComponent(JSON.stringify(level))));
        }

        $('testBtn').addEventListener('click', () => {
            const level = requireValid();
            if (!level) return;
            window.open('game.html?level=' + encodeURIComponent(encodeLevel(level)), '_blank');
        });

        $('shareBtn').addEventListener('click', () => {
            const level = requireValid();
            if (!level) return;
            const base = window.location.origin + window.location.pathname.replace('editor.html', 'game.html');
            const url = base + '?level=' + encodeURIComponent(encodeLevel(level));
            navigator.clipboard.writeText(url).then(
                () => alert('Share link copied to clipboard!\n\nAnyone with this link can play your round.'),
                () => prompt('Copy this share link:', url)
            );
        });

        $('standaloneBtn').addEventListener('click', () => {
            const level = requireValid();
            if (!level) return;
            exportStandalonePage({ level, gameTitle: 'Reaction Slots' });
        });
    </script>
</body>
</html>
